# Development docker-compose with hot reloading
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cactus-postgres
    environment:
      POSTGRES_USER: cactus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: cactus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cactus -d cactus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cactus-network

  # .NET Backend API (development mode with hot reload)
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.dev
    container_name: cactus-api-dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cactus;Username=cactus;Password=${POSTGRES_PASSWORD:?}
      - Jwt__Key=${JWT_KEY:?JWT_KEY must be set in .env}
      - Jwt__Issuer=Cactus
      - Jwt__Audience=CactusApp
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./src/backend/src:/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cactus-network

  # React Frontend (development mode with Vite)
  frontend:
    image: node:22-alpine
    container_name: cactus-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://api:8080
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - cactus-network

volumes:
  postgres_data:

networks:
  cactus-network:
    driver: bridge
