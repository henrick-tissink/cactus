services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cactus-postgres
    environment:
      POSTGRES_USER: cactus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: cactus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cactus -d cactus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cactus-network

  # .NET Backend API
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: cactus-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cactus;Username=cactus;Password=${POSTGRES_PASSWORD:?}
      - Jwt__Key=${JWT_KEY:?JWT_KEY must be set in .env}
      - Jwt__Issuer=Cactus
      - Jwt__Audience=CactusApp
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://localhost
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cactus-network

  # React Frontend
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: cactus-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cactus-network

volumes:
  postgres_data:

networks:
  cactus-network:
    driver: bridge
