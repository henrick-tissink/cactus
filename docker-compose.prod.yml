services:
  postgres:
    restart: unless-stopped
    ports: !reset []
    environment:
      POSTGRES_USER: cactus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: cactus

  api:
    restart: unless-stopped
    ports: !reset []
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cactus;Username=cactus;Password=${POSTGRES_PASSWORD:?}
      - Jwt__Key=${JWT_KEY:?JWT_KEY must be set}
      - Jwt__Issuer=Cactus
      - Jwt__Audience=CactusApp
      - Cors__AllowedOrigins__0=https://cactusmoney.app
      - Cors__AllowedOrigins__1=https://www.cactusmoney.app

  frontend:
    restart: unless-stopped
    ports: !reset []
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: cactus-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cactus-network

volumes:
  caddy_data:
  caddy_config:
