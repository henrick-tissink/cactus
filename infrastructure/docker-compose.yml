services:
  postgres:
    image: postgres:16-alpine
    container_name: cactus-postgres
    environment:
      POSTGRES_USER: cactus
      POSTGRES_PASSWORD: cactus_dev
      POSTGRES_DB: cactus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cactus -d cactus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
